<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고객사 동향 모니터링</title>
<style>
  :root {
    --ink: #111111; --ink-soft: #444444; --ink-faint: #888888;
    --line: #e2e2e2; --line-soft: #efefef; --paper: #ffffff; --paper-dim: #fafafa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Helvetica Neue", -apple-system, "Apple SD Gothic Neo", sans-serif;
    color: var(--ink); background: var(--paper); line-height: 1.6; font-size: 15px; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 24px; }

  header { border-bottom: 2px solid var(--ink); padding: 28px 0 18px; }
  .head-row { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .title { font-size: 29px; font-weight: 700; letter-spacing: -0.02em; }
  .meta { font-size: 12px; color: var(--ink-faint); font-family: monospace; }
  .subtitle { font-size: 13px; color: var(--ink-soft); margin-top: 6px; }

  .tabs { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--line); margin-top: 22px; }
  .tab { appearance: none; border: none; background: none; cursor: pointer; font-family: inherit;
    font-size: 14px; color: var(--ink-faint); padding: 12px 18px 12px 0; margin-right: 20px;
    border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500; }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 700; }
  .tab .cnt { font-family: monospace; font-size: 11px; color: var(--ink-faint); margin-left: 5px; }

  .controls { margin-top: 22px; }
  .ctrl-label { font-family: monospace; font-size: 11px; color: var(--ink-faint);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .period { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { appearance: none; cursor: pointer; font-family: inherit; font-size: 13px;
    background: var(--paper); color: var(--ink-soft); border: 1px solid var(--line); padding: 7px 15px; }
  .chip:hover { border-color: var(--ink); color: var(--ink); }
  .chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); font-weight: 600; }

  .custom-range { display: none; gap: 8px; align-items: center; margin-top: 10px;
    font-size: 13px; color: var(--ink-soft); flex-wrap: wrap; }
  .custom-range.show { display: flex; }
  .custom-range input[type="date"] { font-family: inherit; font-size: 13px;
    border: 1px solid var(--line); padding: 7px 10px; color: var(--ink); }
  .custom-range input[type="date"]:focus { outline: none; border-color: var(--ink); }
  .custom-range .apply { appearance: none; cursor: pointer; font-family: inherit; font-size: 13px;
    font-weight: 600; background: var(--ink); color: var(--paper); border: 1px solid var(--ink); padding: 7px 16px; }

  .searchbar { display: flex; gap: 10px; align-items: center; margin-top: 18px; }
  .searchbar input { flex: 1; font-family: inherit; font-size: 14px; border: 1px solid var(--line);
    padding: 11px 14px; color: var(--ink); }
  .searchbar input:focus { outline: none; border-color: var(--ink); }
  .searchbar button { appearance: none; cursor: pointer; font-family: inherit; font-size: 14px;
    font-weight: 600; background: var(--ink); color: var(--paper); border: 1px solid var(--ink);
    padding: 11px 22px; }
  .searchbar button:disabled { opacity: .4; cursor: default; }
  .note { font-size: 12px; color: var(--ink-faint); margin-top: 8px; }

  .section-bar { display: flex; align-items: center; justify-content: space-between;
    margin: 26px 0 0; padding-bottom: 10px; border-bottom: 1px solid var(--line); flex-wrap: wrap; gap: 8px; }
  .section-bar h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .bar-right { display: flex; align-items: center; gap: 10px; }
  .tag { font-family: monospace; font-size: 11px; color: var(--ink-faint); text-transform: uppercase; }
  .temp-flag { font-family: monospace; font-size: 10px; border: 1px solid var(--ink);
    padding: 1px 6px; margin-left: 8px; vertical-align: middle; }

  .summary-btn { appearance: none; cursor: pointer; font-family: inherit; font-size: 12px;
    font-weight: 600; color: #fff; background: #e24b4a; border: 1px solid #e24b4a; padding: 6px 12px; }
  .summary-btn:hover { opacity: .85; }
  .summary-btn.copied { background: #fff; color: #e24b4a; }

  .copy-guide { font-size: 13.5px; color: #1a56db; margin-top: 8px; line-height: 1.7;
    padding: 11px 15px; border: 1px solid #1a56db; background: #fff; }
  .copy-guide strong { color: #1a56db; font-weight: 700; }

  .item { padding: 16px 0; border-bottom: 1px solid var(--line-soft); }
  .item:last-child { border-bottom: none; }
  .item-src { font-family: monospace; font-size: 11px; color: var(--ink-faint); margin-bottom: 5px; }
  .item-src .dot { margin: 0 7px; }
  .item-title { font-size: 16px; font-weight: 600; line-height: 1.45; }
  .item-title a { color: var(--ink); text-decoration: none; }
  .item-title a:hover { text-decoration: underline; }
  .item-title a::after { content: "\2197"; font-size: 12px; color: var(--ink-faint); margin-left: 6px; font-weight: 400; }

  .more-btn { display: block; width: 100%; margin-top: 20px; padding: 13px; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 600; color: var(--ink);
    background: var(--paper); border: 1px solid var(--ink); }
  .more-btn:hover { background: var(--ink); color: var(--paper); }

  .state { text-align: center; padding: 70px 20px; color: var(--ink-faint); }
  .state .big { font-size: 14px; color: var(--ink-soft); margin-bottom: 6px; }
  .state .small { font-size: 12px; font-family: monospace; }
  .spinner { width: 22px; height: 22px; border: 2px solid var(--line); border-top-color: var(--ink);
    border-radius: 50%; margin: 0 auto 16px; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer { margin-top: 40px; padding: 22px 0 40px; border-top: 1px solid var(--line);
    font-size: 11px; color: var(--ink-faint); font-family: monospace; line-height: 1.7; }

  @media (max-width: 600px) {
    .wrap { padding: 0 16px; } .title { font-size: 22px; }
    .tab { padding-right: 0; margin-right: 14px; font-size: 13px; }
    .searchbar { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="head-row">
      <div class="title" translate="no">고객사 동향 모니터링</div>
      <div class="meta" id="updated" translate="no">—</div>
    </div>
    <div class="subtitle" translate="no">고객사 최신 기사 자동 수집 — 신사업팀(추현진 배포)</div>
  </header>

  <nav class="tabs" id="tabs" translate="no"></nav>

  <div class="controls" translate="no">
    <div class="ctrl-label">수집 기간</div>
    <div class="period" id="period">
      <button class="chip active" data-days="1">최근 1일</button>
      <button class="chip" data-days="5">최근 5일</button>
      <button class="chip" data-days="10">최근 10일</button>
      <button class="chip" data-days="custom">직접 지정</button>
    </div>
    <div class="note" translate="no">수집 상한: 최근 1일 10건 · 최근 5일 20건 · 최근 10일 30건 · 직접 지정 50건</div>
    <div class="custom-range" id="customRange">
      <input type="date" id="dateFrom"><span>~</span><input type="date" id="dateTo">
      <button class="apply" id="applyRange">적용</button>
    </div>
    <div class="searchbar">
      <input type="text" id="searchInput" placeholder="임시 조회 (기업명)">
      <button id="searchBtn">조회</button>
    </div>
    <div class="note" id="searchNote">고정 탭 외 기업을 조회할 때 사용합니다. 기업명을 입력하면 설정된 기간 기준으로 기사를 수집합니다. 결과는 저장되지 않습니다.</div>
  </div>

  <main id="content" translate="yes"></main>
  <footer id="footer" translate="no"></footer>
</div>

<script>
const COMPANIES = ["엔비디아", "테슬라", "스카이디오", "구글", "빈패스트", "보스턴다이내믹스"];

const QUERY_MAP = {
  "엔비디아":       "NVIDIA",
  "테슬라":         "Tesla",
  "스카이디오":     "Skydio",
  "구글":           "Google",
  "빈패스트":       "VinFast",
  "보스턴다이내믹스": "Boston Dynamics"
};

const PAGE_SIZE = 10;
let shownCount = PAGE_SIZE;
let activeTab = COMPANIES[0];
let tempResult = null;
let periodDays = 1;
let customFrom = null, customTo = null;
const CACHE = {};

const tabsEl    = document.getElementById('tabs');
const contentEl = document.getElementById('content');
const updatedEl = document.getElementById('updated');
const footerEl  = document.getElementById('footer');
const searchInput = document.getElementById('searchInput');
const searchBtn   = document.getElementById('searchBtn');
const searchNote  = document.getElementById('searchNote');
const periodEl    = document.getElementById('period');
const customRange = document.getElementById('customRange');
const dateFrom    = document.getElementById('dateFrom');
const dateTo      = document.getElementById('dateTo');
const applyRange  = document.getElementById('applyRange');

const TODAY = new Date();
function fmtDate(daysAgo) {
  const d = new Date(TODAY);
  d.setDate(d.getDate() - daysAgo);
  return d.toISOString().slice(0, 10);
}
updatedEl.textContent = '최종 수집 ' + TODAY.toISOString().slice(0, 10);
dateFrom.max = TODAY.toISOString().slice(0, 10);
dateTo.max   = TODAY.toISOString().slice(0, 10);

function inPeriod(daysAgo) {
  if (periodDays === 'custom') {
    if (!customFrom || !customTo) return true;
    const d = fmtDate(daysAgo);
    return d >= customFrom && d <= customTo;
  }
  return daysAgo <= periodDays;
}
function periodLabel() {
  if (periodDays === 'custom' && customFrom && customTo) return customFrom + ' ~ ' + customTo;
  if (periodDays === 'custom') return '직접 지정';
  return '최근 ' + periodDays + '일';
}

/* ── 기사 수집 ── */
async function fetchArticles(company) {
  const from = customFrom || fmtDate(periodDays === 'custom' ? 30 : periodDays);
  const to   = customTo   || fmtDate(0);
  const cacheKey = company + '_' + from + '_' + to;
  if (CACHE[company] && CACHE[company].key === cacheKey) return CACHE[company].articles;

  const qEn = encodeURIComponent(QUERY_MAP[company] || company);
  const qKo = encodeURIComponent(company);
  const url = '/api/rss?q=' + qEn + '&q2=' + qKo + '&from=' + from + '&to=' + to;
  try {
    const res  = await fetch(url);
    const data = await res.json();
    const articles = data.articles || [];
    CACHE[company] = { articles, key: cacheKey,
      limit: data.limit || articles.length, total: data.total || articles.length };
    return articles;
  } catch(e) {
    console.error(company, e);
    return [];
  }
}

function visibleArticles(company) {
  const cached = CACHE[company];
  if (!cached) return [];
  return cached.articles.filter(a => inPeriod(a.daysAgo));
}

/* ── 렌더링 ── */
function renderTabs() {
  tabsEl.innerHTML = '';
  COMPANIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (c === activeTab && !tempResult ? ' active' : '');
    const cnt = visibleArticles(c).length;
    btn.innerHTML = '<span translate="no">' + c + '</span><span class="cnt">' + cnt + '</span>';
    btn.onclick = () => {
      tempResult = null; activeTab = c; shownCount = PAGE_SIZE;
      searchNote.className = 'note'; delete CACHE[c]; fetchAndRender(c);
    };
    tabsEl.appendChild(btn);
  });
}

function itemRow(a) {
  return '<div class="item">' +
    '<div class="item-src"><span translate="no">' + (a.source || '') + '</span>' +
    '<span class="dot">·</span>' + fmtDate(a.daysAgo) + '</div>' +
    '<div class="item-title" lang="en" translate="yes">' +
    '<a href="' + a.url + '" target="_blank" rel="noopener">' + (a.title || '제목 없음') + '</a>' +
    '</div></div>';
}

function renderMore(total, shownNow) {
  if (total > shownNow) {
    const btn = document.createElement('button');
    btn.className = 'more-btn';
    btn.setAttribute('translate', 'no');
    btn.textContent = '더보기 (+' + Math.min(PAGE_SIZE, total - shownNow) + ')';
    btn.onclick = () => { shownCount += PAGE_SIZE; render(); };
    contentEl.appendChild(btn);
  }
}

function makeSummaryBtn() {
  return '<button class="summary-btn" translate="no" onclick="copySummaryPrompt()">기간 요약용 복사</button>';
}
function makeCopyGuide() {
  return '<div class="copy-guide" translate="no">' +
    '<strong>기간 요약용 복사</strong> 버튼 클릭 시 수집 기사 링크와 요약 프롬프트가 클립보드에 복사됩니다. ' +
    '생성형 AI(Gemini, ChatGPT 등)에 붙여넣기하면 해당 기간 기사를 자동 요약합니다. (본 서비스 내 자동 요약은 제공하지 않습니다.)</div>';
}

function render() {
  renderTabs();

  if (tempResult) {
    const arr   = tempResult.articles.filter(a => inPeriod(a.daysAgo))
                    .sort((x, y) => x.daysAgo - y.daysAgo);
    const shown = arr.slice(0, shownCount);
    const tag   = arr.length > shown.length
      ? periodLabel() + ' · ' + shown.length + ' / ' + arr.length + '건'
      : periodLabel() + ' · ' + arr.length + '건';
    let html = '<div class="section-bar" translate="no">' +
      '<h2><span translate="no">' + tempResult.keyword + '</span>' +
      '<span class="temp-flag">임시 조회</span></h2>' +
      '<div class="bar-right"><span class="tag">' + tag + '</span>' +
      (shown.length ? makeSummaryBtn() : '') + '</div></div>';
    if (shown.length) html += makeCopyGuide();
    html += shown.length ? shown.map(itemRow).join('')
      : '<div class="state"><div class="big">해당 기간에 결과가 없습니다.</div></div>';
    contentEl.innerHTML = html;
    renderMore(arr.length, shown.length);
    return;
  }

  const arr    = visibleArticles(activeTab);
  const shown  = arr.slice(0, shownCount);
  const cached = CACHE[activeTab];
  const total  = cached ? cached.total : arr.length;
  const limit  = cached ? cached.limit : arr.length;
  const tag    = total > limit
    ? periodLabel() + ' · ' + arr.length + '건 (전체 ' + total + '건 중 상위 ' + limit + '건 수집)'
    : periodLabel() + ' · ' + arr.length + '건';

  let html = '<div class="section-bar" translate="no">' +
    '<h2 translate="no">' + activeTab + '</h2>' +
    '<div class="bar-right" translate="no"><span class="tag">' + tag + '</span>' +
    (shown.length ? makeSummaryBtn() : '') + '</div></div>';
  if (shown.length) html += makeCopyGuide();
  html += shown.length ? shown.map(itemRow).join('')
    : '<div class="state" translate="no"><div class="big">해당 기간에 수집된 기사가 없습니다.</div>' +
      '<div class="small">기간을 넓혀 보세요.</div></div>';
  contentEl.innerHTML = html;
  renderMore(arr.length, shown.length);
}

/* ── 기간 요약용 복사 ── */
function copySummaryPrompt() {
  let subject, arr;
  if (tempResult) {
    subject = tempResult.keyword + ' (임시 조회)';
    arr = tempResult.articles.filter(a => inPeriod(a.daysAgo));
  } else {
    subject = activeTab;
    arr = visibleArticles(activeTab);
  }
  arr = arr.slice(0, shownCount);
  const lines = [
    '[기간 동향 종합 요약 요청]', '',
    '아래는 "' + subject + '" 관련 ' + periodLabel() + ' 기간의 수집 기사 목록입니다.',
    '각 기사 원문을 확인하여 이 기간의 동향을 종합 요약해 주세요.', '',
    '요약 원칙:',
    '- 기사에 실제로 보도된 사실만 사용하고, 추론·전망·창작은 배제할 것',
    '- 확인되지 않은 내용은 "확인되지 않음"으로 명시할 것',
    '- 한국어로 간결하게, 핵심 위주로 정리할 것',
    '- 가능하면 주제별로 묶어 정리하고, 각 항목 끝에 출처를 표기할 것', '',
    '기사 목록 (' + arr.length + '건):'
  ];
  arr.forEach((a, i) => {
    lines.push((i + 1) + '. ' + (a.title || '제목 없음') + ' — ' + (a.source || '') + ' (' + fmtDate(a.daysAgo) + ')');
    lines.push('   ' + a.url);
  });
  const text = lines.join('\n');
  const btn  = document.querySelector('.summary-btn');
  function done() {
    if (btn) {
      btn.textContent = '복사됨 — AI에 붙여넣기';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '기간 요약용 복사'; btn.classList.remove('copied'); }, 2500);
    }
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done, () => { fallbackCopy(text); done(); });
  } else { fallbackCopy(text); done(); }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

/* ── fetch + render ── */
async function fetchAndRender(company) {
  contentEl.innerHTML = '<div class="state" translate="no"><div class="spinner"></div>' +
    '<div class="big"><span translate="no">' + company + '</span> 기사 수집 중...</div>' +
    '<div class="small">GOOGLE NEWS RSS → 페이월 매체 제외</div></div>';
  await fetchArticles(company);
  render();
}

/* ── 전체 수집 (초기 로드 및 기간 변경 시 공용) ── */
async function loadAll() {
  await fetchAndRender(activeTab);
  const others = COMPANIES.filter(c => c !== activeTab);
  await Promise.all(others.map(async c => {
    try { await fetchArticles(c); } catch(e) { console.warn(c, e); }
    renderTabs();
  }));
}

/* ── 기간 버튼 ── */
periodEl.addEventListener('click', e => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  periodEl.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  const v = btn.dataset.days;
  if (v === 'custom') {
    customRange.classList.add('show'); periodDays = 'custom';
    if (!dateTo.value)   dateTo.value   = fmtDate(0);
    if (!dateFrom.value) dateFrom.value = fmtDate(15);
  } else {
    customRange.classList.remove('show');
    periodDays = parseInt(v, 10);
    Object.keys(CACHE).forEach(k => delete CACHE[k]);
    loadAll();
  }
});

applyRange.onclick = () => {
  const todayStr = TODAY.toISOString().slice(0, 10);
  if (dateFrom.value && dateFrom.value > todayStr) { alert('시작일은 오늘 이후로 지정할 수 없습니다.'); return; }
  if (dateTo.value   && dateTo.value   > todayStr) { alert('종료일은 오늘 이후로 지정할 수 없습니다.'); return; }
  if (dateFrom.value && dateTo.value && dateFrom.value > dateTo.value) { alert('시작일이 종료일보다 늦습니다.'); return; }
  customFrom = dateFrom.value || null;
  customTo   = dateTo.value   || null;
  Object.keys(CACHE).forEach(k => delete CACHE[k]);
  loadAll();
};

/* ── 임시 조회 ── */
function doSearch() {
  const kw = searchInput.value.trim();
  if (!kw) return;
  shownCount = PAGE_SIZE;
  searchBtn.disabled = true;
  const from = customFrom || fmtDate(periodDays === 'custom' ? 30 : periodDays);
  const to   = customTo   || fmtDate(0);
  contentEl.innerHTML = '<div class="state" translate="no"><div class="spinner"></div>' +
    '<div class="big">"' + kw + '" 기사 수집 중 (' + periodLabel() + ')</div>' +
    '<div class="small">GOOGLE NEWS RSS → 페이월 매체 제외</div></div>';
  fetch('/api/rss?q=' + encodeURIComponent(kw) + '&q2=' + encodeURIComponent(kw) + '&from=' + from + '&to=' + to)
    .then(r => r.json())
    .then(data => {
      tempResult = { keyword: kw, articles: data.articles || [] };
      searchNote.className = 'note';
      searchBtn.disabled = false;
      render();
    })
    .catch(() => {
      tempResult = { keyword: kw, articles: [] };
      searchBtn.disabled = false;
      render();
    });
}
searchBtn.onclick = doSearch;
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

/* ── 푸터 ── */
footerEl.innerHTML =
  '수집 방식: Google News RSS(영문·국문) + 네이버 뉴스 검색 API<br>' +
  '제외 매체: WSJ, Bloomberg, FT, Nikkei, NYT, Reuters 등 유료 구독 매체 및 자사 발표 자료<br>' +
  '기사 제목은 원문 언어로 표시 · 제목 클릭 시 원문 기사로 이동<br>' +
