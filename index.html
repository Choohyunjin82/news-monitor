<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고객사 동향 모니터링</title>
<style>
  :root {
    --ink: #111111; --ink-soft: #444444; --ink-faint: #888888;
    --line: #e2e2e2; --line-soft: #efefef; --paper: #ffffff; --paper-dim: #fafafa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: "Helvetica Neue", -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color: var(--ink); background: var(--paper); line-height: 1.6; font-size: 15px; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 0 24px; }
  header { border-bottom: 2px solid var(--ink); padding: 28px 0 18px; }
  .head-row { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .title { font-size: 29px; font-weight: 700; letter-spacing: -0.02em; }
  .title .mono { font-family: "SF Mono", ui-monospace, monospace; font-weight: 400; color: var(--ink-faint); font-size: 13px; margin-left: 8px; letter-spacing: 0; }
  .meta { font-size: 12px; color: var(--ink-faint); font-family: "SF Mono", ui-monospace, monospace; }
  .subtitle { font-size: 13px; color: var(--ink-soft); margin-top: 6px; }
  .tabs { display: flex; flex-wrap: wrap; border-bottom: 1px solid var(--line); margin-top: 22px; }
  .tab { appearance: none; border: none; background: none; cursor: pointer; font-family: inherit; font-size: 14px;
    color: var(--ink-faint); padding: 12px 18px 12px 0; margin-right: 20px; border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: color .15s, border-color .15s; font-weight: 500; }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 700; }
  .tab .cnt { font-family: "SF Mono", ui-monospace, monospace; font-size: 11px; color: var(--ink-faint); margin-left: 5px; }
  .controls { margin-top: 22px; }
  .ctrl-label { font-family: "SF Mono", ui-monospace, monospace; font-size: 11px; color: var(--ink-faint);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .period { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .chip { appearance: none; cursor: pointer; font-family: inherit; font-size: 13px; background: var(--paper);
    color: var(--ink-soft); border: 1px solid var(--line); padding: 7px 15px; transition: all .12s; }
  .chip:hover { border-color: var(--ink); color: var(--ink); }
  .chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); font-weight: 600; }
  .custom-range { display: none; gap: 8px; align-items: center; margin-top: 10px; font-size: 13px;
    color: var(--ink-soft); flex-wrap: wrap; }
  .custom-range.show { display: flex; }
  .custom-range input[type="date"] { font-family: inherit; font-size: 13px; border: 1px solid var(--line);
    padding: 7px 10px; color: var(--ink); background: var(--paper); }
  .custom-range input[type="date"]:focus { outline: none; border-color: var(--ink); }
  .custom-range .apply { appearance: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600;
    background: var(--ink); color: var(--paper); border: 1px solid var(--ink); padding: 7px 16px; }
  .searchbar { display: flex; gap: 10px; align-items: center; margin-top: 18px; }
  .searchbar input[type="text"] { flex: 1; font-family: inherit; font-size: 14px; border: 1px solid var(--line);
    background: var(--paper); padding: 11px 14px; color: var(--ink); }
  .searchbar input[type="text"]:focus { outline: none; border-color: var(--ink); }
  .searchbar button { appearance: none; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600;
    background: var(--ink); color: var(--paper); border: 1px solid var(--ink); padding: 11px 22px; white-space: nowrap; transition: opacity .15s; }
  .searchbar button:hover { opacity: .82; }
  .searchbar button:disabled { opacity: .4; cursor: default; }
  .note { font-size: 12px; color: var(--ink-faint); margin-top: 8px; }
  .note.temp { color: var(--ink); }
  .section-bar { display: flex; align-items: baseline; justify-content: space-between; margin: 26px 0 4px;
    padding-bottom: 10px; border-bottom: 1px solid var(--line); flex-wrap: wrap; gap: 6px; }
  .section-bar h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
  .section-bar .tag { font-family: "SF Mono", ui-monospace, monospace; font-size: 11px; color: var(--ink-faint);
    text-transform: uppercase; letter-spacing: 0.04em; }
  .temp-flag { display: inline-block; font-family: "SF Mono", ui-monospace, monospace; font-size: 10px;
    border: 1px solid var(--ink); padding: 1px 6px; margin-left: 8px; vertical-align: middle; letter-spacing: 0.03em; }
  .item { padding: 16px 0; border-bottom: 1px solid var(--line-soft); }
  .item:last-child { border-bottom: none; }
  .item-src { font-family: "SF Mono", ui-monospace, monospace; font-size: 11px; color: var(--ink-faint);
    margin-bottom: 5px; letter-spacing: 0.02em; }
  .item-src .dot { margin: 0 7px; }
  .item-title { font-size: 16px; font-weight: 600; line-height: 1.45; letter-spacing: -0.01em; }
  .item-title a { color: var(--ink); text-decoration: none; }
  .item-title a:hover { text-decoration: underline; text-underline-offset: 3px; }
  .item-title a::after { content: "\2197"; font-size: 12px; color: var(--ink-faint); margin-left: 6px; font-weight: 400; }
  .state { text-align: center; padding: 70px 20px; color: var(--ink-faint); }
  .state .big { font-size: 14px; color: var(--ink-soft); margin-bottom: 6px; }
  .state .small { font-size: 12px; font-family: "SF Mono", ui-monospace, monospace; }
  .spinner { width: 22px; height: 22px; border: 2px solid var(--line); border-top-color: var(--ink);
    border-radius: 50%; margin: 0 auto 16px; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .more-btn { display: block; width: 100%; margin-top: 20px; padding: 13px; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 600; color: var(--ink);
    background: var(--paper); border: 1px solid var(--ink); transition: all .12s; }
  .more-btn:hover { background: var(--ink); color: var(--paper); }
  .copy-guide { font-size: 12px; color: var(--ink-faint); margin-top: 6px; line-height: 1.6;
    padding: 8px 12px; border-left: 2px solid #1a56db; background: var(--paper-dim); }
  .copy-guide strong { color: var(--ink-soft); font-weight: 600; }
  .summary-btn { display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    font-family: inherit; font-size: 12.5px; font-weight: 600; color: #ffffff;
    background: #1a56db; border: 1px solid #1a56db; padding: 7px 14px; transition: opacity .12s; }
  .summary-btn:hover { opacity: .85; }
  .summary-btn.copied { background: #ffffff; color: #1a56db; }
  footer { margin-top: 40px; padding: 22px 0 40px; border-top: 1px solid var(--line); font-size: 11px;
    color: var(--ink-faint); font-family: "SF Mono", ui-monospace, monospace; line-height: 1.7; }
  footer .src-list { color: var(--ink-soft); }
  @media (max-width: 600px) {
    .wrap { padding: 0 16px; } .title { font-size: 25px; }
    .tab { padding-right: 0; margin-right: 14px; font-size: 13px; }
    .searchbar { flex-direction: column; align-items: stretch; } .searchbar button { padding: 12px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="head-row">
      <div class="title" translate="no">고객사 동향 모니터링</div>
      <div class="meta" id="updated">—</div>
    </div>
    <div class="subtitle" translate="no">고객사 최신 기사 자동 수집 — 신사업팀(추현진 배포)</div>
  </header>

  <nav class="tabs" id="tabs" translate="no"></nav>

  <div class="controls" translate="no">
    <div class="ctrl-label">수집 기간</div>
    <div class="period" id="period">
      <button class="chip" data-days="1">최근 1일</button>
      <button class="chip active" data-days="7">최근 7일</button>
      <button class="chip" data-days="30">최근 30일</button>
      <button class="chip" data-days="custom">직접 지정</button>
    </div>
    <div class="custom-range" id="customRange">
      <input type="date" id="dateFrom"><span>~</span><input type="date" id="dateTo">
      <button class="apply" id="applyRange">적용</button>
    </div>
    <div class="searchbar">
      <input type="text" id="searchInput" placeholder="임시 조회 (기업명)">
      <button id="searchBtn">조회</button>
    </div>
    <div class="note" id="searchNote">고정 탭 외 기업을 조회할 때 사용합니다. 기업명을 입력하면 설정된 기간 기준으로 기사를 수집합니다. 결과는 저장되지 않습니다.</div>
  </div>

  <main id="content"></main>
  <footer id="footer" translate="no"></footer>
</div>

<script>
/* ============================================================
   [구성 개요 — 단순화 + 차단목록 방식]
   - 기사 수집: 무료 Google News RSS (제목·출처·날짜·링크), 프록시 경유 (배포 시)
   - 매체 정책: 화이트리스트 폐지. 주요 페이월 매체만 차단(BLOCKED_SOURCES), 그 외 전부 표시.
   - 기사 제목은 RSS 원문 그대로 표시. 클릭 시 원문 기사로 연결.
   - 현재: 샘플 데이터로 동작. 샘플은 2026-06 실제 수집 사례를 반영.
   ============================================================ */

const COMPANIES = ["스카이디오", "엔비디아", "구글", "테슬라", "빈패스트", "보스턴다이내믹스"];

/* 회사별 Google News 검색어 — 노이즈 최소화를 위해 정교하게 설정 */
const QUERY_MAP = {
  "스카이디오":     "Skydio",
  "엔비디아":       "NVIDIA",
  "구글":           "Google",
  "테슬라":         "Tesla",
  "빈패스트":       "VinFast",
  "보스턴다이내믹스": "Boston Dynamics"
};

const PAGE_SIZE = 10;  // 더보기 1회당 표시 건수
let shownCount = PAGE_SIZE;  // 현재 화면에 표시 중인 건수

/* 차단 목록 — 페이월/로그인 매체만 제외. 소문자 부분일치로 판정. */
const BLOCKED_SOURCES = [
  "wall street journal", "wsj", "bloomberg", "financial times", "nikkei",
  "the economist", "the information", "barron", "new york times", "nytimes"
];

/* 샘플 데이터 — 2026-06 실제 수집 사례 반영. 배포 시 RSS 수집 결과로 교체.
   (요약 없음: 제목·출처·발행일·링크만) */
/* 수집된 기사 캐시 — fetchArticles()가 채움 */
const CACHE = {};  // { "회사명": { articles: [], fetchedAt: Date } }

/* ---- 실제 RSS 수집 함수 ----
   /api/rss?q=검색어&from=YYYY-MM-DD&to=YYYY-MM-DD 로 호출
   서버리스 함수(rss.js)가 Google News RSS를 프록시해 JSON 반환
*/
async function fetchArticles(company) {
  const cacheKey = company + '_' + (customFrom || fmtDate(periodDays === 'custom' ? 30 : periodDays)) + '_' + (customTo || fmtDate(0));
  if (CACHE[company] && CACHE[company].key === cacheKey) return CACHE[company].articles;
  const q = encodeURIComponent(QUERY_MAP[company] || company);
  const from = customFrom || fmtDate(periodDays === 'custom' ? 30 : periodDays);
  const to   = customTo   || fmtDate(0);
  const url  = '/api/rss?q=' + q + '&from=' + from + '&to=' + to;
  try {
    const res  = await fetch(url);
    const data = await res.json();
    const articles = (data.articles || []).filter(a => !isBlocked(a.source));
    CACHE[company] = { articles, fetchedAt: new Date(), key: cacheKey };
    return articles;
  } catch(e) {
    console.error('RSS 수집 오류:', e);
    return [];
  }
}

let activeTab = COMPANIES[0];
let tempResult = null;
let periodDays = 7;
let customFrom = null, customTo = null;

const tabsEl = document.getElementById('tabs');
const contentEl = document.getElementById('content');
const updatedEl = document.getElementById('updated');
const footerEl = document.getElementById('footer');
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const searchNote = document.getElementById('searchNote');
const periodEl = document.getElementById('period');
const customRange = document.getElementById('customRange');
const dateFrom = document.getElementById('dateFrom');
const dateTo = document.getElementById('dateTo');
const applyRange = document.getElementById('applyRange');

const TODAY = new Date();
function fmtDate(daysAgo) { const d = new Date(TODAY); d.setDate(d.getDate() - daysAgo); return d.toISOString().slice(0, 10); }
updatedEl.textContent = "최종 수집 " + TODAY.toISOString().slice(0,10);
/* 날짜 입력 최대값을 오늘로 제한 (미래 날짜 선택 차단) */
dateFrom.max = TODAY.toISOString().slice(0,10);
dateTo.max = TODAY.toISOString().slice(0,10);

/* 차단 목록 방식: 차단 매체가 아니면 모두 통과 */
function isBlocked(src) { const s = (src || '').toLowerCase(); return BLOCKED_SOURCES.some(b => s.indexOf(b) !== -1); }
function inPeriod(daysAgo) {
  if (periodDays === 'custom') { if (!customFrom || !customTo) return true; const d = fmtDate(daysAgo); return d >= customFrom && d <= customTo; }
  return daysAgo <= periodDays;
}
function periodLabel() {
  if (periodDays === 'custom' && customFrom && customTo) return customFrom + ' ~ ' + customTo;
  if (periodDays === 'custom') return '직접 지정';
  return '최근 ' + periodDays + '일';
}
function visibleArticles(company) {
  /* 배포형: CACHE에서 조회. render() 전에 fetchAndRender()로 먼저 수집. */
  const cached = CACHE[company];
  if (!cached) return [];
  return cached.articles
    .filter(a => inPeriod(a.daysAgo))
    .sort(function(x, y) { return x.daysAgo - y.daysAgo; });
}

function renderTabs() {
  tabsEl.innerHTML = '';
  COMPANIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (c === activeTab && !tempResult ? ' active' : '');
    btn.innerHTML = c + '<span class="cnt">' + visibleArticles(c).length + '</span>';
    btn.onclick = () => { tempResult = null; activeTab = c; shownCount = PAGE_SIZE; searchNote.className = 'note'; delete CACHE[c]; fetchAndRender(c); };
    tabsEl.appendChild(btn);
  });
}
function itemRow(a) {
  return '<div class="item"><div class="item-src" translate="no">' + a.source + '<span class="dot">·</span>' + fmtDate(a.daysAgo) +
    '</div><div class="item-title"><a href="' + a.url + '" target="_blank" rel="noopener">' + (a.title || '제목 없음') + '</a></div></div>';
}
function buildSummaryText() {
  // 현재 화면 컨텍스트(회사/키워드, 기간)와 표시 기사 목록을 취합
  var subject, arr;
  if (tempResult) { subject = tempResult.keyword + ' (임시 조회)'; arr = tempResult.articles.filter(function(a){return inPeriod(a.daysAgo);}); }
  else { subject = activeTab; arr = visibleArticles(activeTab); }
  arr = arr.slice(0, shownCount);

  var lines = [];
  lines.push('[기간 동향 종합 요약 요청]');
  lines.push('');
  lines.push('아래는 "' + subject + '" 관련 ' + periodLabel() + ' 기간의 수집 기사 목록입니다.');
  lines.push('각 기사 원문을 확인하여 이 기간의 동향을 종합 요약해 주세요.');
  lines.push('');
  lines.push('요약 원칙:');
  lines.push('- 기사에 실제로 보도된 사실만 사용하고, 추론·전망·창작은 배제할 것');
  lines.push('- 확인되지 않은 내용은 "확인되지 않음"으로 명시할 것');
  lines.push('- 한국어로 간결하게, 핵심 위주로 정리할 것');
  lines.push('- 가능하면 주제별로 묶어 정리하고, 각 항목 끝에 출처를 표기할 것');
  lines.push('');
  lines.push('기사 목록 (' + arr.length + '건):');
  arr.forEach(function(a, i) {
    lines.push((i + 1) + '. ' + (a.title || '제목 없음') + ' — ' + a.source + ' (' + fmtDate(a.daysAgo) + ')');
    lines.push('   ' + a.url);
  });
  return lines.join('\n');
}
function copySummaryPrompt() {
  var text = buildSummaryText();
  var btn = document.querySelector('.summary-btn');
  function done() { if (btn) { btn.textContent = '복사됨 — AI에 붙여넣기'; btn.classList.add('copied'); setTimeout(function(){ btn.textContent='기간 요약용 복사'; btn.classList.remove('copied'); }, 2500); } }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text); done(); });
  } else { fallbackCopy(text); done(); }
}
function fallbackCopy(text) {
  var ta = document.createElement('textarea'); ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0'; document.body.appendChild(ta);
  ta.select(); try { document.execCommand('copy'); } catch(e) {} document.body.removeChild(ta);
}
/* 탭 클릭·기간 변경 시: 수집 → 렌더 */
async function fetchAndRender(company) {
  contentEl.innerHTML = '<div class="state" translate="no"><div class="spinner"></div>' +
    '<div class="big">' + company + ' 기사 수집 중...</div>' +
    '<div class="small">GOOGLE NEWS RSS → 페이월 매체 제외</div></div>';
  await fetchArticles(company);
  render();
}

function renderMore(total, shownNow) {
  if (total > shownNow) {
    var btn = document.createElement('button');
    btn.className = 'more-btn'; btn.setAttribute('translate','no');
    btn.textContent = '더보기 (+' + Math.min(PAGE_SIZE, total - shownNow) + ')';
    btn.onclick = function() { shownCount += PAGE_SIZE; render(); };
    contentEl.appendChild(btn);
  }
}
function render() {
  renderTabs();
  if (tempResult) {
    const arr = tempResult.articles.filter(a => inPeriod(a.daysAgo)).sort(function(x, y){ return x.daysAgo - y.daysAgo; });
    const shown = arr.slice(0, shownCount);
    const tagTxt = arr.length > shown.length
      ? periodLabel() + ' · ' + shown.length + ' / ' + arr.length + '건'
      : periodLabel() + ' · ' + arr.length + ' ARTICLES';
    let html = '<div class="section-bar" translate="no"><h2>' + tempResult.keyword + '<span class="temp-flag">임시 조회</span></h2>' +
      '<div style="display:flex;align-items:center;gap:12px;"><span class="tag">' + tagTxt + '</span>' +
      (shown.length ? '<button class="summary-btn" onclick="copySummaryPrompt()">기간 요약용 복사</button>' : '') + '</div></div>' +
      (shown.length ? '<div class="copy-guide" translate="no"><strong>기간 요약용 복사</strong> 버튼 클릭 시 수집 기사 링크와 요약 프롬프트가 클립보드에 복사됩니다. 사용 중인 생성형 AI(Gemini, ChatGPT 등)에 붙여넣기하면 해당 기간 기사를 자동 요약합니다.</div>' : '');
    html += shown.length ? shown.map(itemRow).join('')
      : '<div class="state"><div class="big">해당 기간에 결과가 없습니다.</div><div class="small">기간을 넓히거나 다른 키워드로 조회해 보세요.</div></div>';
    contentEl.innerHTML = html;
    renderMore(arr.length, shown.length);
    return;
  }
  const arr = visibleArticles(activeTab);
  const shown = arr.slice(0, shownCount);
  const tagTxt = arr.length > shown.length
    ? periodLabel() + ' · ' + shown.length + ' / ' + arr.length + '건'
    : periodLabel() + ' · ' + arr.length + ' ARTICLES';
  let html = '<div class="section-bar" translate="no"><h2>' + activeTab + '</h2><div style="display:flex;align-items:center;gap:12px;"><span class="tag">' + tagTxt + '</span>' +
    (shown.length ? '<button class="summary-btn" onclick="copySummaryPrompt()">기간 요약용 복사</button>' : '') + '</div></div>' +
    (shown.length ? '<div class="copy-guide" translate="no"><strong>기간 요약용 복사</strong> 버튼 클릭 시 수집 기사 링크와 요약 프롬프트가 클립보드에 복사됩니다. 사용 중인 생성형 AI(Gemini, ChatGPT 등)에 붙여넣기하면 해당 기간 기사를 자동 요약합니다.</div>' : '');
  html += shown.length ? shown.map(itemRow).join('')
    : '<div class="state"><div class="big">해당 기간에 수집된 기사가 없습니다.</div><div class="small">기간을 넓혀 보세요.</div></div>';
  contentEl.innerHTML = html;
  renderMore(arr.length, shown.length);
}

periodEl.addEventListener('click', e => {
  const btn = e.target.closest('.chip'); if (!btn) return;
  periodEl.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  const v = btn.dataset.days;
  if (v === 'custom') {
    customRange.classList.add('show'); periodDays = 'custom';
    if (!dateTo.value) dateTo.value = fmtDate(0);
    if (!dateFrom.value) dateFrom.value = fmtDate(7);
  } else { customRange.classList.remove('show'); periodDays = parseInt(v, 10); Object.keys(CACHE).forEach(k=>delete CACHE[k]); fetchAndRender(activeTab); }
});
applyRange.onclick = () => {
  var todayStr = TODAY.toISOString().slice(0,10);
  if (dateFrom.value && dateFrom.value > todayStr) { alert('시작일은 오늘(' + todayStr + ') 이후로 지정할 수 없습니다.'); return; }
  if (dateTo.value && dateTo.value > todayStr) { alert('종료일은 오늘(' + todayStr + ') 이후로 지정할 수 없습니다.'); return; }
  if (dateFrom.value && dateTo.value && dateFrom.value > dateTo.value) { alert('시작일이 종료일보다 늦습니다. 다시 확인해 주세요.'); return; }
  customFrom = dateFrom.value || null; customTo = dateTo.value || null; Object.keys(CACHE).forEach(k=>delete CACHE[k]); fetchAndRender(activeTab);
};

/* ---- 임시 조회 ----
   배포 시 흐름:
   (1) Google News RSS에 keyword 질의 → 프록시 경유로 XML 수신 (CORS 우회)
   (2) XML 파싱 → 제목·출처·발행일·링크 추출
   (3) 차단 매체 제외 + 기간 필터 후 표시
*/
function doSearch() {
  const kw = searchInput.value.trim(); if (!kw) return;
  shownCount = PAGE_SIZE;
  searchBtn.disabled = true;
  contentEl.innerHTML = '<div class="state"><div class="spinner"></div><div class="big">"' + kw + '" 관련 기사 수집 중 (' + periodLabel() +
    ')</div><div class="small">GOOGLE NEWS RSS → 페이월 매체 제외</div></div>';
  const q = encodeURIComponent(kw);
  const from = customFrom || fmtDate(periodDays === 'custom' ? 30 : periodDays);
  const to   = customTo   || fmtDate(0);
  fetch('/api/rss?q=' + q + '&from=' + from + '&to=' + to)
    .then(r => r.json())
    .then(data => {
      const articles = (data.articles || []).filter(a => !isBlocked(a.source));
      tempResult = { keyword: kw, articles };
      searchNote.className = 'note temp'; searchBtn.disabled = false; render();
    })
    .catch(() => {
      tempResult = { keyword: kw, articles: [] };
      searchBtn.disabled = false; render();
    });
}
searchBtn.onclick = doSearch;
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

footerEl.innerHTML = '<span translate="no">수집 방식: Google News RSS 실시간 수집<br>제외 매체: WSJ, Bloomberg, FT, Nikkei, NYT 등 유료 구독 매체<br>기사 제목은 원문 언어로 표시 · 제목 클릭 시 원문 기사로 이동<br>기간 요약용 복사: 수집 기사 링크와 요약 프롬프트를 클립보드에 복사합니다</span>';

/* 페이지 로딩 시 전체 탭 기사 수 미리 수집 후 탭 숫자 갱신 */
async function prefetchAll() {
  /* 활성 탭은 먼저 수집해 화면 표시 */
  await fetchAndRender(activeTab);
  /* 나머지 탭은 병렬 수집 — 각각 완료될 때마다 탭 숫자 즉시 갱신 */
  const others = COMPANIES.filter(c => c !== activeTab);
  await Promise.all(others.map(async c => {
    try { await fetchArticles(c); } catch(e) { console.warn(c, e); }
    renderTabs();
  }));
}
prefetchAll();
</script>
</body>
</html>
